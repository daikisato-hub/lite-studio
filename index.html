  <style>
    body {

    .wave-bar { width: 4px; border-radius: 2px; animation: wave 1s ease-in-out infinite; margin: 0 3px; }
    .wave-bar:nth-child(1) { animation-delay: 0.0s; } 
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }

    .canvas-container {

    .custom-range:focus { outline: none; }

        -webkit-appearance: none; 
        height: 18px; width: 18px; 
        border-radius: 50%; 
        background: #d946ef;

        width: 100%; height: 4px; cursor: pointer; background: #475569; border-radius: 2px;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const GEMINI_MODEL = "gemini-2.5-flash-preview-tts"; 
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const normalizeText = (t) => (t || "").replace(/\r\n/g, "\n").replace(/\s+/g, " ").trim();

    // ==========================================
    // 優しいエラーハンドリング（リトライ機能付き）
    // ==========================================
    const fetchWithBackoff = async (url, options) => {
      const delays = [1000, 2000, 4000]; 
      let lastError;
      
      for (let i = 0; i <= delays.length; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            if (response.status === 429) {
                throw new Error("🤖 APIが少し息切れしています（無料枠の制限）。少し休ませてから再度お試しください☕");
            } else if (response.status === 400) {
                throw new Error("🔑 APIキーが無効か、入力が間違っているようです。もう一度確認してみてください。");
            } else {
                throw new Error(`予期せぬ通信エラーが発生しました(${response.status})。`);
            }
          }
          return response;
        } catch (e) {
          lastError = e;
          if (i < delays.length && !e.message.includes("APIキーが無効")) {
              await sleep(delays[i]);
          } else {
              throw lastError;
          }
        }
      }
      throw lastError;
    };

    // ==========================================
    // トースト通知システム
    // ==========================================
    const ToastContext = React.createContext();

    function ToastProvider({ children }) {
        const [toasts, setToasts] = useState([]);
        
        const addToast = useCallback((msg, type='info') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => {
                setToasts(prev => prev.filter(t => t.id !== id));
            }, type === 'error' ? 8000 : 4000);
        }, []);
        
        return (
            <ToastContext.Provider value={addToast}>
                {children}
                <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`px-4 py-3 rounded-lg shadow-xl text-sm font-bold flex items-center gap-2 border border-white/10 whitespace-pre-wrap animate-fade-in max-w-md ${t.type === 'error' ? 'bg-rose-500/95 text-white' : t.type === 'success' ? 'bg-emerald-500/95 text-white' : 'bg-slate-800/95 text-white'}`}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            </ToastContext.Provider>
        );
    }
    const useToast = () => React.useContext(ToastContext);

    // ==========================================
    // 音声処理のコアロジック
    // ==========================================
    const audioStock = new Map(); 
    let globalAudioCtx = null;
    let globalSource = null;

    function getAudioContext() {
        if (!globalAudioCtx) {
            globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (globalAudioCtx.state === 'suspended') {
            globalAudioCtx.resume();
        }
        return globalAudioCtx;
    }

    function stopGlobalAudio() {
      if (globalSource) { 
          try { globalSource.stop(); } catch(e){} 
          globalSource = null; 
      }
    }

    function pcm16ToAudioBuffer(base64PCM, audioCtx) {
      const binaryString = atob(base64PCM);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
      }
      const view = new DataView(bytes.buffer);
      const numSamples = Math.floor(len / 2);
      const samples = new Float32Array(numSamples);
      
      const VOLUME_NORMALIZER = 0.85; 
      for (let i = 0; i < numSamples; i++) {
        samples[i] = (view.getInt16(i * 2, true) / 32768.0) * VOLUME_NORMALIZER;
      }
      
      const buffer = audioCtx.createBuffer(1, samples.length, 24000);
      buffer.getChannelData(0).set(samples);
      return buffer;
    }

    function applyFadeInOut(buffer, ctx) {
        const channels = buffer.numberOfChannels;
        const fadeLength = Math.min(buffer.length / 2, Math.floor(0.015 * buffer.sampleRate)); 
        
        for (let c = 0; c < channels; c++) {
            const data = buffer.getChannelData(c);
            const len = data.length;
            for (let i = 0; i < fadeLength; i++) {
                data[i] *= 0.5 * (1 - Math.cos(Math.PI * (i / fadeLength))); 
            }
            for (let i = 0; i < fadeLength; i++) {
                data[len - 1 - i] *= 0.5 * (1 - Math.cos(Math.PI * (i / fadeLength)));
            }
        }
        return buffer;
    }

    // エコモード用の自動カット推測アルゴリズム
    function calculateSplitTimes(fullBuffer, texts) {
        const count = texts.length;
        if (count <= 1) return [];
        
        const channelData = fullBuffer.getChannelData(0);
        const sampleRate = fullBuffer.sampleRate;
        const totalDuration = fullBuffer.duration;

        const lengths = texts.map(t => {
            const normalized = normalizeText(t);
            const punctuationCount = (normalized.match(/[。！？\.\!\?]/g) || []).length;
            return normalized.length > 0 ? normalized.length + (punctuationCount * 5) + 15 : 15;
        });
        
        const totalVirtualLength = lengths.reduce((a, b) => a + b, 0);
        const expectedSplitTimes = [];
        let accLen = 0;
        
        for (let i = 0; i < count - 1; i++) {
            accLen += lengths[i];
            expectedSplitTimes.push((accLen / totalVirtualLength) * totalDuration);
        }

        const silences = [];
        let isSilent = false; 
        let startIdx = 0;
        
        for (let i = 0; i < channelData.length; i++) {
            if (Math.abs(channelData[i]) < 0.01) {
                if (!isSilent) { 
                    isSilent = true; 
                    startIdx = i; 
                }
            } else {
                if (isSilent) {
                    isSilent = false;
                    const duration = (i - startIdx) / sampleRate;
                    if (duration >= 0.2) {
                        silences.push({ start: startIdx, end: i, midTime: ((startIdx + i) / 2) / sampleRate });
                    }
                }
            }
        }
        
        if (isSilent && (channelData.length - startIdx) / sampleRate >= 0.2) {
            silences.push({ start: startIdx, end: channelData.length, midTime: ((startIdx + channelData.length) / 2) / sampleRate });
        }

        const actualSplitTimes = [];
        const usedSilences = new Set();
        
        for (let i = 0; i < expectedSplitTimes.length; i++) {
            const expectedTime = expectedSplitTimes[i];
            let bestSilence = null; 
            let minDiff = Infinity;
            
            for (let j = 0; j < silences.length; j++) {
                if (usedSilences.has(j)) continue;
                const diff = Math.abs(silences[j].midTime - expectedTime);
                if (diff < minDiff && diff < 5.0) { 
                    minDiff = diff; 
                    bestSilence = { silence: silences[j], index: j }; 
                }
            }
            
            if (bestSilence) { 
                usedSilences.add(bestSilence.index); 
                actualSplitTimes.push(bestSilence.silence.midTime); 
            } else {
                actualSplitTimes.push(expectedTime);
            }
        }
        
        actualSplitTimes.sort((a, b) => a - b);
        return actualSplitTimes;
    }

    function splitBufferByTimes(fullBuffer, times, slidesCount, ctx) {
        const sampleRate = fullBuffer.sampleRate;
        const channelData = fullBuffer.getChannelData(0);
        const buffers = [];
        let startSec = 0;
        
        for (let i = 0; i < slidesCount; i++) {
            let endSec = i < times.length ? times[i] : Math.max(fullBuffer.duration, startSec + 3.0);
            if (endSec > fullBuffer.duration + 5.0) endSec = fullBuffer.duration + 5.0;
            if (startSec > endSec) startSec = endSec - 0.1;
            
            const durationSamples = Math.floor(Math.max(0.1, endSec - startSec) * sampleRate);
            const buf = ctx.createBuffer(1, durationSamples, sampleRate);
            const newData = buf.getChannelData(0);
            
            const copyStartSample = Math.floor(startSec * sampleRate);
            const copyEndSample = Math.floor(endSec * sampleRate);
            const actualStart = Math.min(channelData.length, Math.max(0, copyStartSample));
            const actualEnd = Math.min(channelData.length, Math.max(0, copyEndSample));
            
            if (actualEnd - actualStart > 0) {
                newData.set(channelData.subarray(actualStart, actualStart + Math.min(actualEnd - actualStart, durationSamples)), 0);
            }
            buffers.push(applyFadeInOut(buf, ctx));
            startSec = endSec;
        }
        return buffers;
    }

    // ==========================================
    // 画像・字幕・PDFの処理
    // ==========================================
    const preloadImages = async (slides) => {
        const loadedImages = [];
        for (const s of slides) {
            const img = new Image();
            img.src = s.imageDataUrl;
            await new Promise((resolve, reject) => { 
                img.onload = () => resolve(); 
                img.onerror = () => reject(new Error(`Slide ${s.id} error`)); 
            });
            loadedImages.push(img);
        }
        return loadedImages;
    }

    function splitForSubtitles(text) {
      if (!text) return [];
      let parts = text.split(/([。！？\.!?、,])/g);
      let chunks = [];
      
      for(let i=0; i<parts.length; i+=2) {
          let sentence = parts[i] + (parts[i+1] || "");
          if(!sentence.trim()) continue;
          chunks.push(sentence);
      }
      
      const refined = [];
      for (const seg of chunks) {
        if (seg.length <= 35) {
            refined.push(seg);
        } else {
          let remaining = seg;
          while (remaining.length > 0) {
            let cutIdx = 35;
            const goodBreak = remaining.slice(0, 35).lastIndexOf("、");
            if (goodBreak > 10) cutIdx = goodBreak + 1;
            refined.push(remaining.slice(0, cutIdx));
            remaining = remaining.slice(cutIdx);
          }
        }
      }
      return refined;
    }

    async function renderSlidesFromPdf(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const slides = [];
      
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2.0 }); 
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width; 
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        slides.push({ id: i, imageDataUrl: canvas.toDataURL('image/jpeg', 0.8), script: '' });
      }
      return slides;
    }

    // ==========================================
    // MainApp コンポーネント
    // ==========================================
    function MainApp() {
      const toast = useToast();
      const [slides, setSlides] = useState([]);
      const [step, setStep] = useState(1);
      const [jsonText, setJsonText] = useState('');
      const [status, setStatus] = useState(''); 
      const [isBusy, setIsBusy] = useState(false);
      const [progress, setProgress] = useState(0);

      const [localApiKey, setLocalApiKey] = useState('');
      const [showApiKeyModal, setShowApiKeyModal] = useState(false); 
      
      const [audioMode, setAudioMode] = useState('pro'); 
      const [hasSavedData, setHasSavedData] = useState(false); 
      
      const [showSubtitle, setShowSubtitle] = useState(true);
      const [voiceName, setVoiceName] = useState('Kore');
      const [activeSlideIdx, setActiveSlideIdx] = useState(0);
      
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const [leftPanelWidth, setLeftPanelWidth] = useState(40);
      const [dragActive, setDragActive] = useState(false);
      const preloadedImagesRef = useRef([]);

      const [fullBuffer, setFullBuffer] = useState(null);
      const [showManualEditor, setShowManualEditor] = useState(false);
      const [manualSplitTimes, setManualSplitTimes] = useState([]);
      const [editorIndividualBuffers, setEditorIndividualBuffers] = useState(new Map());
      const [editorActiveIdx, setEditorActiveIdx] = useState(-1);
      const [editorIsPlaying, setEditorIsPlaying] = useState(false);
      const [editorSeekRatio, setEditorSeekRatio] = useState(0);
      const [editingSplitIdx, setEditingSplitIdx] = useState(-1);
      
      const activeIdxRef = useRef(-1);
      const isPlayingRef = useRef(false);
      const isSeekingRef = useRef(false);
      const editorAnimRef = useRef(null);
      const editorAudioRef = useRef({ source: null, startTime: 0, offset: 0, duration: 0 });

      // データ復元（localForage）
      useEffect(() => {
        try {
            const savedKey = localStorage.getItem('liteStudioApiKey');
            if (savedKey) setLocalApiKey(savedKey);

            if (typeof window.localforage !== 'undefined') {
                window.localforage.getItem('liteStudioProject').then(data => {
                    if (data && data.slides && data.slides.length > 0) {
                        setHasSavedData(true);
                    }
                }).catch(e => console.warn(e));
            }
        } catch(e) { 
            console.warn("Storage restricted", e); 
        }
      }, []);

      useEffect(() => {
          if (typeof window.localforage !== 'undefined') {
              if (slides.length > 0) {
                  window.localforage.setItem('liteStudioProject', { slides, voiceName, audioMode })
                      .catch(e => console.warn(e));
              } else {
                  window.localforage.removeItem('liteStudioProject')
                      .catch(e => console.warn(e));
              }
          }
      }, [slides, voiceName, audioMode]);

      const loadSavedData = async () => {
          if (typeof window.localforage !== 'undefined') {
              const data = await window.localforage.getItem('liteStudioProject');
              if (data) {
                  setSlides(data.slides);
                  if(data.voiceName) setVoiceName(data.voiceName);
                  if(data.audioMode) setAudioMode(data.audioMode);
                  setStep(3); 
                  setHasSavedData(false);
                  toast("前回の作業データを復元しました", "success");
              }
          }
      };

      const saveApiKey = (key) => {
          setLocalApiKey(key);
          try { localStorage.setItem('liteStudioApiKey', key); } catch(e){}
          setShowApiKeyModal(false);
          toast("APIキーを安全に保存しました", "success");
      };

      const updatePlaybackState = useCallback((idx, isPlaying, ratio) => {
          setEditorActiveIdx(idx); 
          setEditorIsPlaying(isPlaying);
          if (ratio !== undefined) setEditorSeekRatio(ratio);
          activeIdxRef.current = idx; 
          isPlayingRef.current = isPlaying;
      }, []);

      const drawSlideSync = useCallback((slideIdx, subtitleText = "") => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const img = preloadedImagesRef.current[slideIdx];
        
        ctx.fillStyle = "#000"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let imgX, imgY, imgW, imgH;
        
        if (showSubtitle) {
            const areaH = canvas.height * 0.8;
            if (img) {
                const scale = Math.min(canvas.width / img.width, areaH / img.height);
                imgW = img.width * scale; 
                imgH = img.height * scale;
                imgX = (canvas.width - imgW) / 2; 
                imgY = 20 + (areaH - imgH) / 2;
            }
        } else {
            const areaH = canvas.height; 
            const areaW = canvas.width;
            if (img) {
                const scale = Math.min((areaW * 0.95) / img.width, (areaH * 0.95) / img.height);
                imgW = img.width * scale; 
                imgH = img.height * scale;
                imgX = (areaW - imgW) / 2; 
                imgY = (areaH - imgH) / 2;
            }
        }

        if (img) {
            ctx.drawImage(img, imgX, imgY, imgW, imgH);
        } else if (slides[slideIdx]) {
            const tmp = new Image(); 
            tmp.src = slides[slideIdx].imageDataUrl;
            tmp.onload = () => drawSlideSync(slideIdx, subtitleText); 
            return;
        }

        if (showSubtitle && subtitleText) {
            const subH = canvas.height * 0.16;
            ctx.fillStyle = "rgba(0,0,0,0.85)"; 
            ctx.fillRect(40, canvas.height - subH - 30, canvas.width - 80, subH);
            ctx.fillStyle = "#fff"; 
            ctx.textAlign = "center"; 
            ctx.textBaseline = "middle";
            ctx.font = subtitleText.length > 25 ? "bold 40px 'Noto Sans JP'" : "bold 52px 'Noto Sans JP'";
            ctx.fillText(subtitleText, canvas.width / 2, canvas.height - 30 - (subH / 2));
        }
      }, [slides, showSubtitle]); 

      useEffect(() => {
        if (slides.length > 0 && !isBusy) {
            drawSlideSync(activeSlideIdx, splitForSubtitles(slides[activeSlideIdx].script)[0] || "");
        }
      }, [activeSlideIdx, slides, drawSlideSync, isBusy]);

      const handleDrop = async (e) => {
        e.preventDefault(); 
        e.stopPropagation(); 
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0] && e.dataTransfer.files[0].type === "application/pdf") {
            setStatus("PDFレンダリング中...");
            try { 
                setSlides(await renderSlidesFromPdf(e.dataTransfer.files[0])); 
                setStep(2); 
                setStatus(""); 
                toast("PDF読込完了", "success"); 
            } catch(err) { 
                toast(err.message, "error"); 
                setStatus("エラー"); 
            }
        }
      };

      const applyJsonString = (text) => {
        try {
          const json = JSON.parse(text); 
          const newSlides = [...slides]; 
          const list = json.slides || (Array.isArray(json) ? json : []);
          let successCount = 0, outOfRangeCount = 0;
          
          list.forEach((item, idx) => { 
              const targetIndex = item.slide ? parseInt(item.slide) - 1 : idx; 
              if (targetIndex >= 0 && targetIndex < newSlides.length && newSlides[targetIndex]) { 
                  newSlides[targetIndex].script = item.script || ""; 
                  successCount++; 
              } else {
                  outOfRangeCount++; 
              }
          });
          
          setSlides(newSlides); 
          setStep(3);
          
          if (outOfRangeCount > 0) {
              toast(`✅ 成功: ${successCount}件\n⚠️ 未反映: ${outOfRangeCount}件`, "error"); 
          } else {
              toast(`✅ ${successCount}件の適用が完了しました`, "success");
          }
        } catch (err) { 
            toast("JSONエラー: " + err.message, "error"); 
        }
      };

      const generateStockAudioEco = async () => {
        if (!localApiKey) { setShowApiKeyModal(true); return; }
        setIsBusy(true); 
        stopGlobalAudio(); 
        const ctx = getAudioContext(); 
        setStatus("エコモードで音声を一括生成中..."); 
        setProgress(30);

        try {
            const separator = "。\n\n\n\n　　　　　\n\n\n\n"; 
            const combinedScript = slides.map(s => {
                let txt = normalizeText(s.script);
                if(!txt.endsWith("。") && !txt.endsWith("！") && !txt.endsWith("？")) txt += "。";
                return txt + separator;
            }).join("");

            const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, {
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: combinedScript }] }], 
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } },
                    model: GEMINI_MODEL
                })
            });
            const data = await response.json();
            const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);

            setStatus("カットポイントを計算中..."); 
            setProgress(80);
            
            setFullBuffer(buffer); 
            setEditorIndividualBuffers(new Map()); 
            setManualSplitTimes(calculateSplitTimes(buffer, slides.map(s => s.script)));
            
            setShowManualEditor(true); 
            toast("音声の生成が完了しました！カット位置を確認してください。", "success");
        } catch (e) { 
            toast(e.message, "error"); 
        } finally { 
            setIsBusy(false); 
            setProgress(0); 
            setStatus(""); 
        }
      };

      const generateStockAudioPro = async () => {
        if (!localApiKey) { setShowApiKeyModal(true); return; }
        setIsBusy(true); 
        stopGlobalAudio(); 
        const ctx = getAudioContext(); 
        
        audioStock.clear(); 
        setEditorIndividualBuffers(new Map()); 
        setFullBuffer(null);

        let errorOccurred = false;
        
        for (let i = 0; i < slides.length; i++) {
            setStatus(`プロモード：${i+1}/${slides.length}枚目を生成中...`); 
            setProgress((i / slides.length) * 100);
            
            const text = normalizeText(slides[i].script);
            if (!text) continue;
            
            try {
                const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: text }] }], 
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } },
                        model: GEMINI_MODEL
                    })
                });
                const data = await response.json();
                const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);
                applyFadeInOut(buffer, ctx);
                
                audioStock.set(i, buffer); 
                setEditorIndividualBuffers(prev => { const m = new Map(prev); m.set(i, buffer); return m; });
                
                if(i < slides.length - 1) await sleep(1000); 
            } catch (e) { 
                toast(`スライド${i+1}でエラー: ${e.message}`, "error"); 
                errorOccurred = true; 
                break; 
            }
        }
        
        if (!errorOccurred) { 
            setProgress(100); 
            toast("✨ 全スライドの音声を完璧なタイミングで生成しました！", "success"); 
            setStep(4); 
        }
        setIsBusy(false); 
        setProgress(0); 
        setStatus("");
      };

      const generateSingleStock = async (idx) => {
          if (!localApiKey) { setShowApiKeyModal(true); return; }
          setIsBusy(true); 
          setStatus(`単一生成中: Slide ${idx+1}`); 
          const ctx = getAudioContext();
          
          try {
              const text = normalizeText(slides[idx].script);
              if (!text) { 
                  audioStock.delete(idx); 
                  return; 
              }
              const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, { 
                  method: "POST", 
                  headers: { "Content-Type": "application/json" }, 
                  body: JSON.stringify({ 
                      contents: [{ parts: [{ text: text }] }], 
                      generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } }, 
                      model: GEMINI_MODEL 
                  }) 
              });
              const data = await response.json(); 
              const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);
              applyFadeInOut(buffer, ctx); 
              audioStock.set(idx, buffer);
              toast(`スライド ${idx+1} の音声を個別に更新しました`, "success");
          } catch(e) { 
              toast("更新エラー: " + e.message, "error"); 
          } finally { 
              setIsBusy(false); 
              setStatus(""); 
          }
      };

      const regenerateSingleInEditor = async (idx) => {
          if (!localApiKey) { setShowApiKeyModal(true); return; }
          setIsBusy(true); 
          setStatus(`単一生成中: Slide ${idx+1}`); 
          const ctx = getAudioContext();
          
          try {
              const text = normalizeText(slides[idx].script);
              if (!text) { 
                  setEditorIndividualBuffers(prev => { const m = new Map(prev); m.delete(idx); return m; }); 
                  return; 
              }
              const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, { 
                  method: "POST", 
                  headers: { "Content-Type": "application/json" }, 
                  body: JSON.stringify({ 
                      contents: [{ parts: [{ text: text }] }], 
                      generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } }, 
                      model: GEMINI_MODEL 
                  }) 
              });
              const data = await response.json(); 
              const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);
              applyFadeInOut(buffer, ctx); 
              
              setEditorIndividualBuffers(prev => { const m = new Map(prev); m.set(idx, buffer); return m; });
              updatePlaybackState(idx, false, 0); 
              toast(`スライド ${idx+1} の音声を個別に更新しました`, "success");
          } catch(e) { 
              toast("更新エラー: " + e.message, "error"); 
          } finally { 
              setIsBusy(false); 
              setStatus(""); 
          }
      };

      const playStockAudio = async (idx) => {
        stopGlobalAudio(); 
        const ctx = getAudioContext();
        if (audioStock.has(idx)) {
            globalSource = ctx.createBufferSource(); 
            globalSource.buffer = audioStock.get(idx);
            globalSource.connect(ctx.destination); 
            globalSource.start(); 
            globalSource.onended = () => { globalSource = null; };
        }
      };
      // ==========================================
      // 最終エンコード処理 (WebCodecs API)
      // ==========================================
      const exportVideoFromStock = async () => {
          const missing = slides.findIndex((_, i) => !audioStock.has(i) && normalizeText(slides[i].script) !== "");
          if (missing !== -1) { 
              toast(`スライド${missing+1}の音声がありません。\n音声タブで生成してください。`, "error"); 
              return; 
          }

          setIsBusy(true); 
          setStatus("画像をプリロード中...");
          try { 
              preloadedImagesRef.current = await preloadImages(slides); 
          } catch(e) { 
              toast("画像読込失敗: " + e.message, "error"); 
              setIsBusy(false); 
              return; 
          }

          drawSlideSync(0, ""); 
          await sleep(100);

          try {
              setStatus("MP4エンコード準備中..."); 
              setProgress(0);
              
              const FPS = 30; 
              const TARGET_SAMPLE_RATE = 44100;

              // ★前回の反省を活かし、fastStart指定を確実に追加しています
              let muxer = new Mp4Muxer.Muxer({
                  target: new Mp4Muxer.ArrayBufferTarget(),
                  video: { codec: 'avc', width: 1280, height: 720 },
                  audio: { codec: 'aac', numberOfChannels: 2, sampleRate: TARGET_SAMPLE_RATE },
                  fastStart: 'in-memory'
              });

              const videoEncoder = new VideoEncoder({ 
                  output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), 
                  error: e => console.error(e) 
              });
              videoEncoder.configure({ 
                  codec: 'avc1.4D001F', 
                  width: 1280, height: 720, 
                  bitrate: 2500000, 
                  framerate: FPS 
              });

              const audioEncoder = new AudioEncoder({ 
                  output: (chunk, meta) => muxer.addAudioChunk(chunk, meta), 
                  error: e => console.error(e) 
              });
              audioEncoder.configure({ 
                  codec: 'mp4a.40.2', 
                  numberOfChannels: 2, 
                  sampleRate: TARGET_SAMPLE_RATE, 
                  bitrate: 128000 
              });

              let videoTimestampUs = 0; 
              let audioTimestampUs = 0;

              // 金属音を除去するノイズフィルター（アップサンプリング）
              async function resampleTo44100Stereo(buffer) {
                  if (!buffer) return null;
                  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
                  const offlineCtx = new OfflineCtx(2, Math.ceil(buffer.duration * TARGET_SAMPLE_RATE), TARGET_SAMPLE_RATE);
                  const source = offlineCtx.createBufferSource(); 
                  source.buffer = buffer;
                  
                  const filter = offlineCtx.createBiquadFilter(); 
                  filter.type = 'lowpass'; 
                  filter.frequency.value = 10000;
                  
                  source.connect(filter); 
                  filter.connect(offlineCtx.destination); 
                  source.start(0);
                  
                  return await offlineCtx.startRendering();
              }

              async function encodeAudioBuffer(originalBuffer) {
                  if (!originalBuffer) return;
                  const resampled = await resampleTo44100Stereo(originalBuffer);
                  const chanL = resampled.getChannelData(0); 
                  const chanR = resampled.getChannelData(1);
                  const interleaved = new Float32Array(resampled.length * 2);
                  
                  for (let i = 0; i < resampled.length; i++) { 
                      interleaved[i * 2] = chanL[i]; 
                      interleaved[i * 2 + 1] = chanR[i]; 
                  }
                  
                  let offset = 0;
                  while (offset < resampled.length) {
                      const framesToEncode = Math.min(TARGET_SAMPLE_RATE, resampled.length - offset);
                      const chunkData = interleaved.slice(offset * 2, (offset + framesToEncode) * 2);
                      const audioData = new AudioData({ 
                          format: 'f32', 
                          sampleRate: TARGET_SAMPLE_RATE, 
                          numberOfFrames: framesToEncode, 
                          numberOfChannels: 2, 
                          timestamp: Math.round(audioTimestampUs + (offset / TARGET_SAMPLE_RATE) * 1000000), 
                          data: chunkData 
                      });
                      audioEncoder.encode(audioData); 
                      audioData.close(); 
                      offset += framesToEncode;
                      if (audioEncoder.encodeQueueSize > 30) await sleep(10);
                  }
                  audioTimestampUs += (resampled.length / TARGET_SAMPLE_RATE) * 1000000;
              }

              async function encodeSilence(durationSec) {
                  const frames = Math.floor(durationSec * TARGET_SAMPLE_RATE); 
                  if (frames <= 0) return;
                  const interleaved = new Float32Array(frames * 2); 
                  let offset = 0;
                  while (offset < frames) {
                      const framesToEncode = Math.min(TARGET_SAMPLE_RATE, frames - offset);
                      const chunkData = interleaved.slice(offset * 2, (offset + framesToEncode) * 2);
                      const audioData = new AudioData({ 
                          format: 'f32', 
                          sampleRate: TARGET_SAMPLE_RATE, 
                          numberOfFrames: framesToEncode, 
                          numberOfChannels: 2, 
                          timestamp: Math.round(audioTimestampUs + (offset / TARGET_SAMPLE_RATE) * 1000000), 
                          data: chunkData 
                      });
                      audioEncoder.encode(audioData); 
                      audioData.close(); 
                      offset += framesToEncode;
                      if (audioEncoder.encodeQueueSize > 30) await sleep(10);
                  }
                  audioTimestampUs += (frames / TARGET_SAMPLE_RATE) * 1000000;
              }

              // メインのエンコードループ
              for (let i = 0; i < slides.length; i++) {
                  setActiveSlideIdx(i); 
                  setStatus(`MP4生成中: ${i+1}/${slides.length}枚目`);
                  
                  const buffer = audioStock.has(i) ? audioStock.get(i) : null;
                  const audioDur = buffer ? buffer.duration : 0.5;
                  const preSilence = 0.5; 
                  const postSilence = 1.5;

                  // 音声タイムラインの配置
                  await encodeSilence(preSilence);
                  if (buffer) {
                      await encodeAudioBuffer(buffer); 
                  } else {
                      await encodeSilence(audioDur);
                  }
                  await encodeSilence(postSilence);

                  // 映像タイムラインの配置
                  const totalFrames = Math.floor((preSilence + audioDur + postSilence) * FPS);
                  const segments = splitForSubtitles(normalizeText(slides[i].script));

                  for (let f = 0; f < totalFrames; f++) {
                      const timeSec = f / FPS; 
                      let currentSubtitle = "";
                      if (timeSec >= preSilence && timeSec < preSilence + audioDur && segments.length > 0) {
                          currentSubtitle = segments[Math.floor(Math.min((timeSec - preSilence) / audioDur, 0.99) * segments.length)] || "";
                      }
                      
                      drawSlideSync(i, currentSubtitle);
                      const frame = new VideoFrame(canvasRef.current, { timestamp: Math.round(videoTimestampUs + (f * 1000000 / FPS)) });
                      videoEncoder.encode(frame, { keyFrame: f % (FPS * 2) === 0 }); 
                      frame.close();
                      
                      if (videoEncoder.encodeQueueSize > 30) await sleep(1);
                      if (f % 15 === 0) setProgress(((i + f / totalFrames) / slides.length) * 100);
                  }
                  videoTimestampUs += (totalFrames * 1000000 / FPS);
              }

              setProgress(100); 
              setStatus("最終ファイルを構築中...");
              
              await videoEncoder.flush(); 
              await audioEncoder.flush(); 
              muxer.finalize();

              const finalBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
              const a = document.createElement('a'); 
              a.href = URL.createObjectURL(finalBlob); 
              a.download = `LiteStudioPro_Export.mp4`; 
              a.click();

              toast("✨ MP4動画の出力が完了しました！", "success");
          } catch (e) { 
              console.error(e); 
              toast("エラー: " + e.message, "error"); 
          } finally { 
              setIsBusy(false); 
              setStatus(""); 
          }
      };

      // ==========================================
      // 手動エディタ（エコモード用）の機能群
      // ==========================================
      const adjustSplitTime = (idx, delta) => {
          setManualSplitTimes(prev => {
              const arr = [...prev];
              for(let j = idx; j < arr.length; j++) {
                  arr[j] = Math.max(0, arr[j] + delta);
              }
              for(let j = 1; j < arr.length; j++) {
                  if (arr[j] <= arr[j-1]) arr[j] = arr[j-1] + 0.1;
              }
              return arr;
          });
      };

      const handleSplitTimeChange = (idx, val) => {
          let num = parseFloat(val); 
          if (isNaN(num)) return;
          setManualSplitTimes(prev => {
              const arr = [...prev]; 
              const delta = num - arr[idx];
              for(let j = idx; j < arr.length; j++) {
                  arr[j] = Math.max(0, arr[j] + delta);
              }
              for(let j = 1; j < arr.length; j++) {
                  if (arr[j] <= arr[j-1]) arr[j] = arr[j-1] + 0.1;
              }
              return arr;
          });
      };

      const applyManualSplit = () => {
          pauseEditorSegment(); 
          const ctx = getAudioContext();
          const buffers = splitBufferByTimes(fullBuffer, manualSplitTimes, slides.length, ctx);
          audioStock.clear();
          buffers.forEach((buf, idx) => { 
              if (idx < slides.length) {
                  audioStock.set(idx, editorIndividualBuffers.has(idx) ? editorIndividualBuffers.get(idx) : buf); 
              }
          });
          setShowManualEditor(false); 
          toast("音声を割り当てました！", "success");
      };

      const pauseEditorSegment = useCallback(() => {
          stopGlobalAudio(); 
          if (editorAnimRef.current) cancelAnimationFrame(editorAnimRef.current);
          updatePlaybackState(activeIdxRef.current, false);
      }, [updatePlaybackState]);

      const startEditorSegment = useCallback((idx, start, end, duration, startOffsetRatio) => {
          stopGlobalAudio(); 
          if (editorAnimRef.current) cancelAnimationFrame(editorAnimRef.current);
          
          updatePlaybackState(idx, true, startOffsetRatio);
          const startOffsetSec = duration * startOffsetRatio; 
          const ctx = getAudioContext();
          const source = ctx.createBufferSource(); 
          globalSource = source; 
          
          if (editorIndividualBuffers.has(idx)) { 
              source.buffer = editorIndividualBuffers.get(idx); 
              source.connect(ctx.destination); 
              source.start(0, startOffsetSec); 
          } else { 
              source.buffer = fullBuffer; 
              source.connect(ctx.destination); 
              const safeOffset = Math.min(startOffsetSec, Math.max(0, duration - 0.1)); 
              source.start(0, start + safeOffset, duration - safeOffset); 
          }
          
          editorAudioRef.current = { 
              source, 
              startTime: ctx.currentTime, 
              offset: startOffsetSec, 
              duration: duration 
          };
          
          const loop = () => {
              if (activeIdxRef.current !== idx || !isPlayingRef.current) return;
              if (!isSeekingRef.current) {
                  const elapsed = ctx.currentTime - editorAudioRef.current.startTime + editorAudioRef.current.offset;
                  if (elapsed >= duration) { 
                      updatePlaybackState(idx, false, 1); 
                      return; 
                  }
                  setEditorSeekRatio(elapsed / duration);
              }
              editorAnimRef.current = requestAnimationFrame(loop);
          };
          editorAnimRef.current = requestAnimationFrame(loop);
      }, [fullBuffer, editorIndividualBuffers, updatePlaybackState]);

      const togglePlayPause = (idx, start, end, duration) => {
          if (activeIdxRef.current === idx && isPlayingRef.current) {
              pauseEditorSegment();
          } else {
              let ratio = 0;
              if (activeIdxRef.current === idx) ratio = editorSeekRatio >= 1 ? 0 : editorSeekRatio;
              startEditorSegment(idx, start, end, duration, ratio);
          }
      };

      const handleSeekChange = (idx, ratio) => { 
          isSeekingRef.current = true; 
          if (activeIdxRef.current !== idx) {
              updatePlaybackState(idx, false, ratio); 
          } else {
              setEditorSeekRatio(ratio); 
          }
      };
      
      const handleSeekEnd = (idx, start, end, duration, ratio) => { 
          isSeekingRef.current = false; 
          if (isPlayingRef.current && activeIdxRef.current === idx) {
              startEditorSegment(idx, start, end, duration, ratio); 
          } else {
              updatePlaybackState(idx, false, ratio); 
          }
      };

      // ==========================================
      // UI / 描画部分 (render)
      // ==========================================
      return (
        <div className="h-screen flex flex-col text-sm" 
             onMouseMove={e => { 
                 if (isDraggingSplitter) { 
                     e.preventDefault(); 
                     const newWidth = (e.clientX / window.innerWidth) * 100;

          {/* APIキー入力モーダル */}

              <div className="absolute inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="glass-panel p-8 rounded-2xl max-w-md w-full shadow-2xl border border-fuchsia-500/30 animate-fade-in">
                      <div className="text-4xl text-center mb-4">🔑</div>

                          <button onClick={()=>saveApiKey(document.getElementById('apiKeyInput').value)} className="flex-1 py-3 rounded-lg bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white font-bold hover:from-fuchsia-500 transition">保存して開始</button>

                      </div>

          )}

          <header className="glass-panel border-b border-slate-700/50 p-3 flex justify-between items-center z-10 sticky top-0">

                {[1,2,3,4].map(n =>

                            className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all duration-300 ${step===n ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-[0_0_10px_rgba(219,39,119,0.5)]' : 'bg-slate-800/50 text-slate-400 hover:bg-slate-800'}`}>
                        {['PDF','JSON','音声','出力'][n-1]}
                    </button>
                )}
              </div>
            </div>
            <div className="flex items-center gap-4">
               <button onClick={()=>setShowApiKeyModal(true)} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full transition-colors group">
                   <span className="text-[10px]">{localApiKey ? '🟢' : '🔴'}</span>
                   <span className="text-xs font-bold text-slate-300 group-hover:text-white">API Key</span>
               </button>
            </div>
          </header>

          <div className="flex-1 flex overflow-hidden">
            {/* 左パネル */}
            <div className="bg-slate-900/40 backdrop-blur-sm overflow-y-auto border-r border-slate-700/50 flex flex-col" style={{width: `${leftPanelWidth}%`}}>
              <div className="p-6 space-y-6">
                
                {/* STEP 1: PDF */}
                {step === 1 && (

                    <div className={`glass-panel p-10 rounded-2xl border-2 border-dashed transition-all duration-300 text-center flex flex-col items-center justify-center gap-4 ${dragActive ? 'drag-active' : 'border-slate-600 hover:border-fuchsia-500/50'}`}

                        <div className="text-6xl mb-2 animate-bounce">📄</div>

                  <div className="glass-panel p-6 rounded-2xl border-slate-700 animate-fade-in">
                    <h2 className="text-lg font-bold mb-4 text-white flex items-center gap-2"><span className="text-fuchsia-400">📜</span> JSONスクリプト適用</h2>
                    <input type="file" accept=".json" className="mb-6 block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-slate-800 file:text-fuchsia-400 hover:file:bg-slate-700 cursor-pointer"
                           onChange={async e=>{
                               if(e.target.files[0]){ 
                                   try{ 
                                       const text = await e.target.files[0].text(); 
                                       applyJsonString(text); 
                                   } catch(err) { toast(err.message,"error"); } 
                               }
                           }}/>
                    <div className="flex items-center my-4"><div className="flex-grow border-t border-slate-700"></div><span className="mx-4 text-[10px] text-slate-500 uppercase tracking-widest">OR PASTE</span><div className="flex-grow border-t border-slate-700"></div></div>
                    <textarea value={jsonText} onChange={e => setJsonText(e.target.value)} placeholder='{"slides": [{"slide": 1, "script": "..."}]}' className="w-full h-40 bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-xs font-mono text-fuchsia-100 focus:border-fuchsia-500 outline-none transition-all"></textarea>
                    <div className="flex gap-3 justify-end mt-6">
                      <button onClick={()=>setStep(3)} className="text-slate-500 text-xs hover:text-white px-4 py-2 transition-colors">スキップ</button>
                      <button onClick={() => applyJsonString(jsonText)} disabled={!jsonText.trim()} className="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-lg transition-all disabled:opacity-50">適用して次へ</button>
                    </div>
                  </div>
                )}

                {/* STEP 3: 音声 */}
                {step === 3 && (
                  <div className="space-y-4">
                    <div className="glass-panel p-5 rounded-2xl border-slate-700 sticky top-0 z-10 shadow-2xl">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg text-white flex items-center gap-2"><span className="text-cyan-400">🎙️</span> 音声生成 ({slides.length}枚)</h3>
                          <button onClick={()=>setStep(4)} className="bg-gradient-to-r from-cyan-500 to-blue-500 text-white px-5 py-1.5 rounded-lg font-bold text-xs shadow-[0_0_10px_rgba(6,182,212,0.4)] transform active:scale-95 transition-all">出力へ &rarr;</button>
                        </div>
                        
                        <div className="bg-black/40 p-1.5 rounded-xl flex gap-1 mb-4 border border-slate-700">
                            <button onClick={()=>setAudioMode('eco')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all flex flex-col items-center gap-1 ${audioMode==='eco' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span>🌱 エコモード</span><span className="text-[9px] font-normal opacity-80">一括生成 (API 1回)</span>
                            </button>
                            <button onClick={()=>setAudioMode('pro')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all flex flex-col items-center gap-1 ${audioMode==='pro' ? 'bg-fuchsia-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span>👑 プロモード</span><span className="text-[9px] font-normal opacity-80">個別生成 (ズレなし)</span>
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-2 mb-4">
                            {['Kore','Fenrir','Puck'].map(v=>
                                <button key={v} onClick={()=>setVoiceName(v)} className={`text-[10px] py-1.5 rounded-md border transition-all ${voiceName===v?'bg-indigo-600 text-white border-indigo-400':'bg-slate-800 text-slate-400 border-slate-700'}`}>
                                    {v}
                                </button>
                            )}
                        </div>
                        
                        <button onClick={audioMode === 'eco' ? generateStockAudioEco : generateStockAudioPro} disabled={isBusy} 
                                className={`w-full font-bold py-3 rounded-lg text-sm shadow-lg flex items-center justify-center gap-2 transition-all transform active:scale-[0.98] disabled:opacity-50 ${audioMode==='eco' ? 'bg-gradient-to-r from-emerald-600 to-teal-600 text-white' : 'bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white'}`}>
                            {audioMode === 'eco' ? '🌱 エコモードで音声を一括生成' : '👑 プロモードで全自動生成'}
                        </button>
                        
                        {fullBuffer && audioMode === 'eco' && !showManualEditor && (
                            <button onClick={()=>setShowManualEditor(true)} className="w-full mt-3 bg-slate-800 text-emerald-400 font-bold py-2 rounded-lg text-xs border border-emerald-500/30 transition-colors">✂️ エディタを再表示</button>
                        )}
                    </div>
                    
                    <div className="space-y-3 pb-20">
                      {slides.map((s, i) => {
                        const hasStock = audioStock.has(i);
                        return (
                          <div key={i} onClick={()=>setActiveSlideIdx(i)} className={`glass-panel p-3 rounded-xl border transition-all cursor-pointer flex gap-4 group ${activeSlideIdx === i ? 'border-fuchsia-500 bg-fuchsia-900/10' : 'border-slate-700/50 hover:border-slate-600'}`}>
                            <div className="w-24 shrink-0 aspect-video bg-black rounded-lg overflow-hidden relative mt-1">
                                <img src={s.imageDataUrl} className="w-full h-full object-cover opacity-80"/>
                                <div className="absolute top-0 left-0 bg-black/60 text-[9px] px-1.5 py-0.5 text-white font-mono rounded-br-md">#{i+1}</div>
                                {hasStock && <div className="absolute bottom-1 right-1 w-2 h-2 rounded-full bg-emerald-500"></div>}
                            </div>
                            <div className="flex-1 flex flex-col gap-2">
                               <textarea value={s.script} onChange={e=>{ const ns = [...slides]; ns[i].script = e.target.value; setSlides(ns); }} onClick={e=>e.stopPropagation()} className="w-full h-20 bg-slate-950/30 border border-slate-700/50 rounded-lg p-2 text-xs text-slate-300 focus:text-white outline-none resize-y"/>
                               <div className="flex justify-end gap-2 items-center">
                                 {hasStock ? <span className="text-[10px] text-emerald-400">Ready</span> : <span className="text-[10px] text-slate-500">Empty</span>}
                                 <button onClick={e=>{e.stopPropagation(); generateSingleStock(i);}} className="text-[9px] bg-slate-800 text-slate-300 px-3 py-1 rounded border border-slate-600 hover:bg-slate-700">更新(単体)</button>
                                 <button onClick={e=>{e.stopPropagation(); stopGlobalAudio();}} className="text-[10px] bg-red-900/40 text-red-300 px-3 py-1 rounded hover:bg-red-900/60">■</button>
                                 <button onClick={e=>{e.stopPropagation(); playStockAudio(i);}} className="text-[10px] bg-cyan-900/40 text-cyan-300 px-3 py-1 rounded font-bold hover:bg-cyan-900/60">▶</button>
                               </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                
                {/* STEP 4: 出力 */}
                {step === 4 && (
                   <div className="glass-panel p-8 rounded-2xl border-slate-700 space-y-8 animate-fade-in flex flex-col items-center">
                      <div className="w-full flex items-center justify-between border-b border-slate-700/50 pb-4">
                        <button onClick={()=>setStep(3)} className="text-xs text-slate-400 hover:text-white">← 戻る</button>
                        <h3 className="font-bold text-xl text-white tracking-widest">FINAL EXPORT</h3>
                        <div className="w-16"></div>
                      </div>

                      <div className="bg-slate-900/60 p-8 rounded-2xl border border-fuchsia-500/20 text-center w-full max-w-md shadow-2xl">
                          <div className="text-6xl mb-4">💎</div>
                          <div className="text-xl font-bold text-white mb-2">Studio Master Engine</div>
                          <p className="text-[11px] text-slate-400 mb-6">iPhoneやすべてのデバイスで再生可能な<br/>高品質MP4をブラウザ内で直接生成します。</p>
                          
                          <div className="bg-black/50 p-4 rounded-xl border border-slate-800 mb-6">
                              <div className="text-3xl font-black text-white flex justify-center gap-1">
                                 <span className={audioStock.size === slides.length ? "text-emerald-400" : "text-amber-400"}>{audioStock.size}</span> 
                                 <span className="text-sm text-slate-600 font-normal mt-3">/ {slides.length}</span>
                              </div>
                              {audioStock.size < slides.length && <p className="text-[10px] text-amber-500 mt-2">⚠️ 音声が不足しています</p>}
                          </div>
                          
                          <div className="flex justify-between items-center bg-slate-950/50 rounded-lg p-2 border border-slate-800 mb-8">
                             <span className="text-xs font-bold text-slate-400 ml-2">Subtitles (字幕)</span>
                             <div className="flex bg-black rounded-md p-1 border border-slate-700">
                               <button onClick={()=>setShowSubtitle(true)} className={`px-4 py-1 rounded text-[10px] font-bold transition-all ${showSubtitle?'bg-fuchsia-600 text-white shadow-md':'text-slate-500 hover:text-slate-300'}`}>ON</button>
                               <button onClick={()=>setShowSubtitle(false)} className={`px-4 py-1 rounded text-[10px] font-bold transition-all ${!showSubtitle?'bg-slate-700 text-white shadow-md':'text-slate-500 hover:text-slate-300'}`}>OFF</button>
                             </div>
                          </div>
                          
                          <button onClick={exportVideoFromStock} disabled={isBusy} 
                                  className={`w-full py-5 rounded-xl font-black text-lg shadow-xl flex justify-center gap-3 transition-all transform active:scale-95 ${isBusy ? 'bg-slate-800 text-slate-500' : 'bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:shadow-[0_0_20px_rgba(79,70,229,0.4)]'}`}>
                            {isBusy ? <div className="spinner border-white/50 border-l-white"></div> : <span>🚀 MP4を出力する</span>}
                          </button>
                      </div>
                   </div>
                )}
              </div>
              
              {/* 投げ銭リンク */}
              <div className="p-4 text-center border-t border-slate-800 bg-slate-900/50 mt-auto">
                  <a href="https://www.buymeacoffee.com/" target="_blank" rel="noopener noreferrer" className="text-[10px] text-slate-500 hover:text-amber-400 transition-colors flex items-center justify-center gap-1">
                      ☕ この無料ツールが役に立ったら開発者にコーヒーを奢る
                  </a>
              </div>
            </div>

            <div className={`w-1 z-20 cursor-col-resize transition-colors ${isDraggingSplitter ? 'bg-fuchsia-500' : 'bg-slate-800 hover:bg-fuchsia-500'}`} onMouseDown={(e) => { e.preventDefault(); setIsDraggingSplitter(true); }} />

            {/* 右パネル：プレビュー */}
            <div className="flex-1 bg-black flex flex-col relative canvas-container" ref={containerRef}>
              <div className="flex-1 flex items-center justify-center p-8">
                 <div className="relative shadow-2xl border border-slate-800 bg-black rounded-sm overflow-hidden ring-1 ring-white/5">
                    <canvas ref={canvasRef} width={1280} height={720} className="max-w-full max-h-full object-contain"/>
                 </div>
              </div>
              <div className="bg-slate-900/80 backdrop-blur border-t border-slate-800 p-3 flex justify-between items-center text-xs text-slate-400">
                 <div className="font-mono">{status || "Ready"}</div>
                 <div className="font-mono">Slide: <span className="text-white">{activeSlideIdx + 1}</span> <span className="opacity-50">/</span> {slides.length || 0}</div>
              </div>
              
              {isBusy && (
                <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50 backdrop-blur-md">
                  <div className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-cyan-400 animate-pulse mb-2">{status}</div>
                  <div className="w-1/2 h-1 bg-slate-800 rounded-full mt-4 overflow-hidden relative">
                      <div className="h-full bg-fuchsia-500 transition-all duration-300" style={{width: `${progress}%`}}></div>
                  </div>
                </div>
              )}
            </div>

            {/* 手動エディタ (エコモード用のみ表示) */}
            {showManualEditor && fullBuffer && audioMode === 'eco' && (
              <div className="absolute inset-0 z-50 bg-black/95 flex flex-col p-6 animate-fade-in backdrop-blur-xl">
                 <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                    <div>
                        <h2 className="text-2xl font-bold text-white">✂️ 手動カット調整 (エコモード)</h2>
                        <p className="text-xs text-slate-400 mt-1">±ボタンで微調整してください。</p>
                    </div>
                    <div className="flex gap-3">
                        <button onClick={()=>{pauseEditorSegment(); setShowManualEditor(false);}} className="px-4 py-2 rounded-lg bg-slate-800 text-white">キャンセル</button>
                        <button onClick={applyManualSplit} className="px-6 py-2 rounded-lg bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold">この設定で分割を確定</button>
                    </div>
                 </div>
                 <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                    {slides.map((s, i) => {
                        const startSec = i === 0 ? 0 : manualSplitTimes[i-1];
                        const endSec = i === slides.length - 1 ? (manualSplitTimes.length > 0 ? Math.max(fullBuffer.duration, manualSplitTimes[manualSplitTimes.length - 1] + 3.0) : fullBuffer.duration) : manualSplitTimes[i];
                        const duration = Math.max(0.1, endSec - startSec);
                        const isThisActive = editorActiveIdx === i;
                        return (
                           <div key={i} className={`glass-panel p-5 rounded-xl flex items-stretch gap-5 border ${isThisActive ? 'border-emerald-500 bg-emerald-900/10' : 'border-slate-700'}`}>
                               <div className="w-36 shrink-0 aspect-video bg-black rounded-lg overflow-hidden relative mt-1">
                                   <img src={s.imageDataUrl} className="w-full h-full object-cover opacity-80"/>
                                   <div className="absolute top-0 left-0 bg-black/80 text-[10px] px-2 py-1 text-white">Slide {i+1}</div>
                               </div>
                               <div className="flex-1 flex flex-col gap-3 justify-between">
                                   <div className="flex gap-2">
                                       <textarea value={s.script} onChange={(e)=>{ const ns = [...slides]; ns[i].script = e.target.value; setSlides(ns); }} className="flex-1 h-16 bg-black/40 border border-slate-600 rounded-lg p-2 text-xs text-slate-200 outline-none" />
                                       <button onClick={()=>regenerateSingleInEditor(i)} className="w-16 bg-slate-800 text-fuchsia-400 font-bold rounded-lg text-[10px] border border-slate-600">🔄 再生成</button>
                                   </div>
                                   <div className="flex items-center justify-end gap-2 text-xs text-slate-300">
                                       <button onClick={()=>adjustSplitTime(i, -0.5)} className="px-2 py-1 bg-slate-800 rounded">-0.5s</button>
                                       <button onClick={()=>adjustSplitTime(i, -0.1)} className="px-2 py-1 bg-slate-800 rounded">-0.1s</button>
                                       {editingSplitIdx === i ? ( 
                                           <input type="number" step="0.01" defaultValue={(manualSplitTimes[i] || 0).toFixed(2)} autoFocus 
                                                  onBlur={(e) => { handleSplitTimeChange(i, e.target.value); setEditingSplitIdx(-1); }} 
                                                  onKeyDown={(e) => { if (e.key === 'Enter') { handleSplitTimeChange(i, e.target.value); setEditingSplitIdx(-1); } if (e.key === 'Escape') setEditingSplitIdx(-1); }} 
                                                  className="w-16 bg-black text-center border border-fuchsia-500 rounded py-1 text-xs text-white outline-none" /> 
                                       ) : ( 
                                           <div onDoubleClick={() => setEditingSplitIdx(i)} className="w-16 text-center py-1 text-xs text-white font-mono cursor-pointer border border-slate-700 bg-black rounded">{(manualSplitTimes[i] || 0).toFixed(2)}</div> 
                                       )}
                                       <button onClick={()=>adjustSplitTime(i, 0.1)} className="px-2 py-1 bg-slate-800 rounded">+0.1s</button>
                                       <button onClick={()=>adjustSplitTime(i, 0.5)} className="px-2 py-1 bg-slate-800 rounded">+0.5s</button>
                                   </div>
                                   <div className="flex items-center gap-4 p-2 rounded-xl border bg-black/40 border-slate-700">
                                       <button onClick={() => togglePlayPause(i, startSec, endSec, duration)} className="w-10 h-10 rounded-full flex items-center justify-center bg-emerald-600/20 text-emerald-400 text-lg">
                                           {isThisActive && editorIsPlaying ? '⏸️' : '▶'}
                                       </button>
                                       <input type="range" min="0" max="1" step="0.001" value={isThisActive ? editorSeekRatio : 0} 
                                              onChange={(e) => handleSeekChange(i, parseFloat(e.target.value))} 
                                              onMouseUp={(e) => handleSeekEnd(i, startSec, endSec, duration, parseFloat(e.target.value))} 
                                              className="flex-1 custom-range"/>
                                   </div>
                               </div>
                           </div>
                        )
                    })}
                 </div>
              </div>
            )}
            
          </div>
        </div>
      );
    }

    function App() { 
        return (
            <ToastProvider>
                <MainApp />
            </ToastProvider>
        ); 
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
