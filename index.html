  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #05050a; color: #e2e8f0; overflow: hidden; background-image: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(219, 39, 119, 0.1), transparent 25%); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #db2777; }
    .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    @keyframes wave { 0%, 100% { height: 10px; transform: scaleY(1); background: #8b5cf6; } 50% { height: 24px; transform: scaleY(1.5); background: #ec4899; } }
    .wave-bar { width: 4px; border-radius: 2px; animation: wave 1s ease-in-out infinite; margin: 0 3px; }
    .wave-bar:nth-child(1) { animation-delay: 0.0s; } .wave-bar:nth-child(2) { animation-delay: 0.1s; } .wave-bar:nth-child(3) { animation-delay: 0.2s; } .wave-bar:nth-child(4) { animation-delay: 0.3s; } .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .canvas-container { background-color: #000; background-image: linear-gradient(rgba(30, 20, 50, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 20, 50, 0.3) 1px, transparent 1px); background-size: 40px 40px; }
    .drag-active { border-color: #d946ef; background-color: rgba(217, 70, 239, 0.1); box-shadow: 0 0 20px rgba(217, 70, 239, 0.2); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-range { -webkit-appearance: none; background: transparent; height: 28px; margin: 0; cursor: pointer; }
    .custom-range:focus { outline: none; }
    .custom-range::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #d946ef; cursor: pointer; margin-top: -7px; box-shadow: 0 0 8px rgba(217, 70, 239, 0.9); position: relative; z-index: 10; }
    .custom-range::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #475569; border-radius: 2px; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const GEMINI_MODEL = "gemini-2.5-flash-preview-tts"; 
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const normalizeText = (t) => (t || "").replace(/\r\n/g, "\n").replace(/\s+/g, " ").trim();

    // ★改善④：エラーハンドリング（優しい言葉への翻訳）
    const fetchWithBackoff = async (url, options) => {
      const delays = [1000, 2000, 4000]; // 最大3回リトライ
      let lastError;
      for (let i = 0; i <= delays.length; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            if (response.status === 429) {
                throw new Error("🤖 APIが少し息切れしています（無料枠の制限）。1分ほど休ませてから再度お試しください☕");
            } else if (response.status === 400) {
                throw new Error("🔑 APIキーが無効か、入力が間違っているようです。もう一度確認してみてくださいね。");
            } else {
                throw new Error(`予期せぬ通信エラーが発生しました(${response.status})。時間をおいてお試しください。`);
            }
          }
          return response;
        } catch (e) {
          lastError = e;
          if (i < delays.length && !e.message.includes("APIキーが無効")) {
              await sleep(delays[i]); // 400エラー以外ならリトライ
          } else {
              throw lastError;
          }
        }
      }
      throw lastError;
    };

    const ToastContext = React.createContext();

    function ToastProvider({ children }) {
        const [toasts, setToasts] = useState([]);
        const addToast = useCallback((msg, type='info') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), type === 'error' ? 8000 : 4000);
        }, []);
        
        return (
            <ToastContext.Provider value={addToast}>
                {children}
                <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`px-4 py-3 rounded-lg shadow-xl text-sm font-bold flex items-center gap-2 border border-white/10 whitespace-pre-wrap animate-fade-in max-w-md ${t.type === 'error' ? 'bg-rose-500/95 text-white' : t.type === 'success' ? 'bg-emerald-500/95 text-white' : 'bg-slate-800/95 text-white'}`}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            </ToastContext.Provider>
        );
    }
    const useToast = () => React.useContext(ToastContext);

    const audioStock = new Map(); 
    let globalAudioCtx = null;
    let globalSource = null;

    function getAudioContext() {
        if (!globalAudioCtx) globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        return globalAudioCtx;
    }

    function stopGlobalAudio() {
      if (globalSource) { try { globalSource.stop(); } catch(e){} globalSource = null; }
    }

    function pcm16ToAudioBuffer(base64PCM, audioCtx) {
      const binaryString = atob(base64PCM);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
      const view = new DataView(bytes.buffer);
      const numSamples = Math.floor(len / 2);
      const samples = new Float32Array(numSamples);
      const VOLUME_NORMALIZER = 0.85; 
      for (let i = 0; i < numSamples; i++) {
        samples[i] = (view.getInt16(i * 2, true) / 32768.0) * VOLUME_NORMALIZER;
      }
      const buffer = audioCtx.createBuffer(1, samples.length, 24000);
      buffer.getChannelData(0).set(samples);
      return buffer;
    }

    function applyFadeInOut(buffer, ctx) {
        const channels = buffer.numberOfChannels;
        const fadeLength = Math.min(buffer.length / 2, Math.floor(0.015 * buffer.sampleRate)); 
        for (let c = 0; c < channels; c++) {
            const data = buffer.getChannelData(c);
            const len = data.length;
            for (let i = 0; i < fadeLength; i++) data[i] *= 0.5 * (1 - Math.cos(Math.PI * (i / fadeLength))); 
            for (let i = 0; i < fadeLength; i++) data[len - 1 - i] *= 0.5 * (1 - Math.cos(Math.PI * (i / fadeLength)));
        }
        return buffer;
    }

    // エコモード用の分割推測ロジック
    function calculateSplitTimes(fullBuffer, texts) {
        const count = texts.length;
        if (count <= 1) return [];

        const channelData = fullBuffer.getChannelData(0);
        const sampleRate = fullBuffer.sampleRate;
        const totalDuration = fullBuffer.duration;

        const lengths = texts.map(t => {
            const normalized = normalizeText(t);
            return normalized.length > 0 ? normalized.length + ( (normalized.match(/[。！？\.\!\?]/g) || []).length * 5) + 15 : 15;
        });
        const totalVirtualLength = lengths.reduce((a, b) => a + b, 0);
        
        const expectedSplitTimes = [];
        let accLen = 0;
        for (let i = 0; i < count - 1; i++) {
            accLen += lengths[i];
            expectedSplitTimes.push((accLen / totalVirtualLength) * totalDuration);
        }

        const silences = [];
        const threshold = 0.01; 
        const minSilence = 0.2; 
        let isSilent = false;
        let startIdx = 0;

        for (let i = 0; i < channelData.length; i++) {
            if (Math.abs(channelData[i]) < threshold) {
                if (!isSilent) { isSilent = true; startIdx = i; }
            } else {
                if (isSilent) {
                    isSilent = false;
                    const duration = (i - startIdx) / sampleRate;
                    if (duration >= minSilence) silences.push({ start: startIdx, end: i, midTime: ((startIdx + i) / 2) / sampleRate });
                }
            }
        }
        if (isSilent) {
             const duration = (channelData.length - startIdx) / sampleRate;
             if (duration >= minSilence) silences.push({ start: startIdx, end: channelData.length, midTime: ((startIdx + channelData.length) / 2) / sampleRate });
        }

        const actualSplitTimes = [];
        const usedSilences = new Set();

        for (let i = 0; i < expectedSplitTimes.length; i++) {
            const expectedTime = expectedSplitTimes[i];
            let bestSilence = null;
            let minDiff = Infinity;

            for (let j = 0; j < silences.length; j++) {
                if (usedSilences.has(j)) continue;
                const diff = Math.abs(silences[j].midTime - expectedTime);
                if (diff < minDiff && diff < 5.0) { 
                    minDiff = diff;
                    bestSilence = { silence: silences[j], index: j };
                }
            }
            if (bestSilence) {
                usedSilences.add(bestSilence.index);
                actualSplitTimes.push(bestSilence.silence.midTime);
            } else {
                actualSplitTimes.push(expectedTime);
            }
        }

        actualSplitTimes.sort((a, b) => a - b);
        return actualSplitTimes;
    }

    function splitBufferByTimes(fullBuffer, times, slidesCount, ctx) {
        const sampleRate = fullBuffer.sampleRate;
        const channelData = fullBuffer.getChannelData(0);
        const buffers = [];
        
        let startSec = 0;
        for (let i = 0; i < slidesCount; i++) {
            let endSec = i < times.length ? times[i] : Math.max(fullBuffer.duration, startSec + 3.0);
            if (endSec > fullBuffer.duration + 5.0) endSec = fullBuffer.duration + 5.0;
            if (startSec > endSec) startSec = endSec - 0.1;
            
            const durationSamples = Math.floor(Math.max(0.1, endSec - startSec) * sampleRate);
            const buf = ctx.createBuffer(1, durationSamples, sampleRate);
            const newData = buf.getChannelData(0);
            
            const copyStartSample = Math.floor(startSec * sampleRate);
            const copyEndSample = Math.floor(endSec * sampleRate);
            const actualStart = Math.min(channelData.length, Math.max(0, copyStartSample));
            const actualEnd = Math.min(channelData.length, Math.max(0, copyEndSample));
            
            if (actualEnd - actualStart > 0) {
                newData.set(channelData.subarray(actualStart, actualStart + Math.min(actualEnd - actualStart, durationSamples)), 0);
            }
            buffers.push(applyFadeInOut(buf, ctx));
            startSec = endSec;
        }
        return buffers;
    }

    const preloadImages = async (slides) => {
        const loadedImages = [];
        for (const s of slides) {
            const img = new Image();
            img.src = s.imageDataUrl;
            await new Promise((resolve, reject) => {
                img.onload = () => resolve();
                img.onerror = () => reject(new Error(`Slide ${s.id} error`));
            });
            loadedImages.push(img);
        }
        return loadedImages;
    }

    function splitForSubtitles(text) {
      if (!text) return [];
      const MAX_LENGTH = 35; 
      let parts = text.split(/([。！？\.!?、,])/g);
      let chunks = [];
      for(let i=0; i<parts.length; i+=2) {
          let sentence = parts[i] + (parts[i+1] || "");
          if(!sentence.trim()) continue;
          chunks.push(sentence);
      }
      const refined = [];
      for (const seg of chunks) {
        if (seg.length <= MAX_LENGTH) {
          refined.push(seg);
        } else {
          let remaining = seg;
          while (remaining.length > 0) {
            let cutIdx = MAX_LENGTH;
            const goodBreak = remaining.slice(0, MAX_LENGTH).lastIndexOf("、");
            if (goodBreak > 10) cutIdx = goodBreak + 1;
            refined.push(remaining.slice(0, cutIdx));
            remaining = remaining.slice(cutIdx);
          }
        }
      }
      return refined;
    }

    async function renderSlidesFromPdf(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const slides = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2.0 }); 
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width; 
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        slides.push({ id: i, imageDataUrl: canvas.toDataURL('image/jpeg', 0.8), script: '' });
      }
      return slides;
    }

    function MainApp() {
      const toast = useToast();
      const [slides, setSlides] = useState([]);
      const [step, setStep] = useState(1);
      const [jsonText, setJsonText] = useState('');
      const [status, setStatus] = useState(''); 
      const [isBusy, setIsBusy] = useState(false);
      const [progress, setProgress] = useState(0);

      const [localApiKey, setLocalApiKey] = useState('');
      const [showApiKeyModal, setShowApiKeyModal] = useState(false); // ★改善②：APIキー入力モーダル
      
      // ★改善①：モード選択 state
      const [audioMode, setAudioMode] = useState('pro'); // 'eco' or 'pro'

      const [hasSavedData, setHasSavedData] = useState(false); // ★改善③：データ復元フラグ

      const [showSubtitle, setShowSubtitle] = useState(true);
      const [voiceName, setVoiceName] = useState('Kore');
      const [activeSlideIdx, setActiveSlideIdx] = useState(0);
      
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const [leftPanelWidth, setLeftPanelWidth] = useState(40);
      const [dragActive, setDragActive] = useState(false);
      const preloadedImagesRef = useRef([]);

      const [fullBuffer, setFullBuffer] = useState(null);
      const [showManualEditor, setShowManualEditor] = useState(false);
      const [manualSplitTimes, setManualSplitTimes] = useState([]);
      const [editorIndividualBuffers, setEditorIndividualBuffers] = useState(new Map());
      const [editorActiveIdx, setEditorActiveIdx] = useState(-1);
      const [editorIsPlaying, setEditorIsPlaying] = useState(false);
      const [editorSeekRatio, setEditorSeekRatio] = useState(0);
      const [editingSplitIdx, setEditingSplitIdx] = useState(-1);
      
      const activeIdxRef = useRef(-1);
      const isPlayingRef = useRef(false);
      const isSeekingRef = useRef(false);
      const editorAnimRef = useRef(null);
      const editorAudioRef = useRef({ source: null, startTime: 0, offset: 0, duration: 0 });

      // ★改善③：起動時に保存データをチェック（ローカルDB）
      useEffect(() => {
        const savedKey = localStorage.getItem('liteStudioApiKey');
        if (savedKey) setLocalApiKey(savedKey);

        localforage.getItem('liteStudioProject').then(data => {
            if (data && data.slides && data.slides.length > 0) {
                setHasSavedData(true);
            }
        });
      }, []);

      // ★改善③：スライドや設定が変わるたびに自動保存
      useEffect(() => {
          if (slides.length > 0) {
              localforage.setItem('liteStudioProject', { slides, voiceName, audioMode });
          } else {
              localforage.removeItem('liteStudioProject');
          }
      }, [slides, voiceName, audioMode]);

      const loadSavedData = async () => {
          const data = await localforage.getItem('liteStudioProject');
          if (data) {
              setSlides(data.slides);
              if(data.voiceName) setVoiceName(data.voiceName);
              if(data.audioMode) setAudioMode(data.audioMode);
              setStep(3);
              setHasSavedData(false);
              toast("前回の作業データを復元しました", "success");
          }
      };

      const saveApiKey = (key) => {
          setLocalApiKey(key);
          localStorage.setItem('liteStudioApiKey', key);
          setShowApiKeyModal(false);
          toast("APIキーをブラウザに安全に保存しました", "success");
      };

      const updatePlaybackState = useCallback((idx, isPlaying, ratio) => {
          setEditorActiveIdx(idx);
          setEditorIsPlaying(isPlaying);
          if (ratio !== undefined) setEditorSeekRatio(ratio);
          activeIdxRef.current = idx;
          isPlayingRef.current = isPlaying;
      }, []);

      const drawSlideSync = useCallback((slideIdx, subtitleText = "") => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const img = preloadedImagesRef.current[slideIdx];
        
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let imgX, imgY, imgW, imgH;
        
        if (showSubtitle) {
            const areaH = canvas.height * 0.8;
            if (img) {
                const scale = Math.min(canvas.width / img.width, areaH / img.height);
                imgW = img.width * scale;
                imgH = img.height * scale;
                imgX = (canvas.width - imgW) / 2;
                imgY = 20 + (areaH - imgH) / 2;
            }
        } else {
            const areaH = canvas.height;
            const areaW = canvas.width;
            if (img) {
                const scale = Math.min((areaW * 0.95) / img.width, (areaH * 0.95) / img.height);
                imgW = img.width * scale;
                imgH = img.height * scale;
                imgX = (areaW - imgW) / 2;
                imgY = (areaH - imgH) / 2;
            }
        }

        if (img) ctx.drawImage(img, imgX, imgY, imgW, imgH);
        else if (slides[slideIdx]) {
            const tmp = new Image();
            tmp.src = slides[slideIdx].imageDataUrl;
            tmp.onload = () => drawSlideSync(slideIdx, subtitleText); 
            return;
        }

        if (showSubtitle && subtitleText) {
            const subH = canvas.height * 0.16;
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(40, canvas.height - subH - 30, canvas.width - 80, subH);
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 52px 'Noto Sans JP'";
            if (subtitleText.length > 25) ctx.font = "bold 40px 'Noto Sans JP'";
            ctx.fillText(subtitleText, canvas.width / 2, canvas.height - 30 - (subH / 2));
        }
      }, [slides, showSubtitle, preloadedImagesRef.current]); 

      useEffect(() => {
        if (slides.length > 0 && !isBusy) drawSlideSync(activeSlideIdx, splitForSubtitles(slides[activeSlideIdx].script)[0] || "");
      }, [activeSlideIdx, slides, drawSlideSync, isBusy]);

      // ★改善①：エコモード（一括生成）
      const generateStockAudioEco = async () => {
        if (!localApiKey) { setShowApiKeyModal(true); return; }
        
        setIsBusy(true); stopGlobalAudio();
        const ctx = getAudioContext(); 
        setStatus("エコモードで音声を一括生成中...");
        setProgress(30);

        try {
            // スライドの区切りを明確にする特殊な空白を追加
            const separator = "。\n\n\n\n　　　　　\n\n\n\n"; 
            const combinedScript = slides.map(s => {
                let txt = normalizeText(s.script);
                if(!txt.endsWith("。") && !txt.endsWith("！") && !txt.endsWith("？")) txt += "。";
                return txt + separator;
            }).join("");

            const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: combinedScript }] }], 
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } },
                    model: GEMINI_MODEL
                })
            });
            const data = await response.json();
            const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);

            setStatus("カットポイントを計算中...");
            setProgress(80);

            setFullBuffer(buffer);
            setEditorIndividualBuffers(new Map()); 
            const texts = slides.map(s => s.script);
            const times = calculateSplitTimes(buffer, texts);
            setManualSplitTimes(times);
            
            setShowManualEditor(true); // エコモードは手動エディタを開く
            toast("音声の生成が完了しました！カット位置を確認してください。", "success");

        } catch (e) {
            toast(e.message, "error");
        } finally {
            setIsBusy(false); setProgress(0); setStatus("");
        }
      };

      // ★改善①：プロモード（完全個別・ズレなし）
      const generateStockAudioPro = async () => {
        if (!localApiKey) { setShowApiKeyModal(true); return; }
        
        setIsBusy(true); stopGlobalAudio();
        const ctx = getAudioContext(); 
        audioStock.clear();
        setEditorIndividualBuffers(new Map());
        setFullBuffer(null);

        let errorOccurred = false;

        for (let i = 0; i < slides.length; i++) {
            setStatus(`プロモード：${i+1}/${slides.length}枚目を生成中...`);
            setProgress((i / slides.length) * 100);
            
            const text = normalizeText(slides[i].script);
            if (!text) continue;

            try {
                const response = await fetchWithBackoff(`${GEMINI_URL}?key=${localApiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: text }] }], 
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } },
                        model: GEMINI_MODEL
                    })
                });
                const data = await response.json();
                const buffer = pcm16ToAudioBuffer(data.candidates[0].content.parts[0].inlineData.data, ctx);
                applyFadeInOut(buffer, ctx);
                
                audioStock.set(i, buffer);
                // エディタ用にも一応入れておく
                setEditorIndividualBuffers(prev => { const m = new Map(prev); m.set(i, buffer); return m; });
                
                // 次のAPIリクエストまで少し待機してAPI制限を避ける
                if(i < slides.length - 1) await sleep(1000); 

            } catch (e) {
                toast(`スライド${i+1}でエラー: ${e.message}`, "error");
                errorOccurred = true;
                break; // エラーが起きたらループ中断
            }
        }

        if (!errorOccurred) {
            setProgress(100);
            toast("✨ 全スライドの音声を完璧なタイミングで生成しました！", "success");
            // プロモードはズレないので手動エディタは開かず、そのまま出力可能状態にする
            setStep(4);
        }
        setIsBusy(false); setProgress(0); setStatus("");
      };

      // 共通の再生・停止機能
      const playStockAudio = async (idx) => {
        stopGlobalAudio();
        const ctx = getAudioContext();
        if (audioStock.has(idx)) {
            const buf = audioStock.get(idx);
            globalSource = ctx.createBufferSource();
            globalSource.buffer = buf;
            globalSource.connect(ctx.destination);
            globalSource.start();
            globalSource.onended = () => { globalSource = null; };

      };

      const exportVideoFromStock = async () => {
          const missing = slides.findIndex((_, i) => !audioStock.has(i) && normalizeText(slides[i].script) !== "");
          if (missing !== -1) {
              toast(`スライド${missing+1}の音声がありません。\n音声タブで生成してください。`, "error");
              return;
          }

          setIsBusy(true); 
          setStatus("画像をプリロード中...");
          try { preloadedImagesRef.current = await preloadImages(slides); } 
          catch(e) { toast("画像読込失敗: " + e.message, "error"); setIsBusy(false); return; }

          drawSlideSync(0, "");
          await sleep(100);

          try {
              setStatus("MP4エンコード準備中...");
              setProgress(0);

              const FPS = 30;
              const TARGET_SAMPLE_RATE = 44100;

              let muxer = new Mp4Muxer.Muxer({
                  target: new Mp4Muxer.ArrayBufferTarget(),
                  video: { codec: 'avc', width: 1280, height: 720 },
                  audio: { codec: 'aac', numberOfChannels: 2, sampleRate: TARGET_SAMPLE_RATE },
                  fastStart: 'in-memory'
              });

              const videoEncoder = new VideoEncoder({
                  output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                  error: e => console.error(e)
              });
              videoEncoder.configure({ codec: 'avc1.4D001F', width: 1280, height: 720, bitrate: 2500000, framerate: FPS });

              const audioEncoder = new AudioEncoder({
                  output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
                  error: e => console.error(e)
              });
              audioEncoder.configure({ codec: 'mp4a.40.2', numberOfChannels: 2, sampleRate: TARGET_SAMPLE_RATE, bitrate: 128000 });

              let videoTimestampUs = 0;
              let audioTimestampUs = 0;

              async function resampleTo44100Stereo(buffer) {
                  if (!buffer) return null;
                  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
                  const offlineCtx = new OfflineCtx(2, Math.ceil(buffer.duration * TARGET_SAMPLE_RATE), TARGET_SAMPLE_RATE);
                  const source = offlineCtx.createBufferSource();
                  source.buffer = buffer;
                  const filter = offlineCtx.createBiquadFilter();
                  filter.type = 'lowpass'; filter.frequency.value = 10000;
                  source.connect(filter); filter.connect(offlineCtx.destination);
                  source.start(0);
                  return await offlineCtx.startRendering();
              }

              async function encodeAudioBuffer(originalBuffer) {
                  if (!originalBuffer) return;
                  const resampled = await resampleTo44100Stereo(originalBuffer);
                  const chanL = resampled.getChannelData(0); const chanR = resampled.getChannelData(1);
                  const interleaved = new Float32Array(resampled.length * 2);
                  for (let i = 0; i < resampled.length; i++) { interleaved[i * 2] = chanL[i]; interleaved[i * 2 + 1] = chanR[i]; }
                  const chunkSize = TARGET_SAMPLE_RATE; let offset = 0;
                  while (offset < resampled.length) {
                      const framesToEncode = Math.min(chunkSize, resampled.length - offset);
                      const chunkData = interleaved.slice(offset * 2, (offset + framesToEncode) * 2);
                      const audioData = new AudioData({ format: 'f32', sampleRate: TARGET_SAMPLE_RATE, numberOfFrames: framesToEncode, numberOfChannels: 2, timestamp: Math.round(audioTimestampUs + (offset / TARGET_SAMPLE_RATE) * 1000000), data: chunkData });
                      audioEncoder.encode(audioData); audioData.close();
                      offset += framesToEncode;
                      if (audioEncoder.encodeQueueSize > 30) await sleep(10);
                  }
                  audioTimestampUs += (resampled.length / TARGET_SAMPLE_RATE) * 1000000;
              }

              async function encodeSilence(durationSec) {
                  const frames = Math.floor(durationSec * TARGET_SAMPLE_RATE);
                  if (frames <= 0) return;
                  const interleaved = new Float32Array(frames * 2); 
                  const chunkSize = TARGET_SAMPLE_RATE; let offset = 0;
                  while (offset < frames) {
                      const framesToEncode = Math.min(chunkSize, frames - offset);
                      const chunkData = interleaved.slice(offset * 2, (offset + framesToEncode) * 2);
                      const audioData = new AudioData({ format: 'f32', sampleRate: TARGET_SAMPLE_RATE, numberOfFrames: framesToEncode, numberOfChannels: 2, timestamp: Math.round(audioTimestampUs + (offset / TARGET_SAMPLE_RATE) * 1000000), data: chunkData });
                      audioEncoder.encode(audioData); audioData.close();
                      offset += framesToEncode;
                      if (audioEncoder.encodeQueueSize > 30) await sleep(10);
                  }
                  audioTimestampUs += (frames / TARGET_SAMPLE_RATE) * 1000000;
              }

              for (let i = 0; i < slides.length; i++) {
                  setActiveSlideIdx(i);
                  setStatus(`MP4生成中: ${i+1}/${slides.length}枚目`);

                  const buffer = audioStock.has(i) ? audioStock.get(i) : null;
                  const audioDur = buffer ? buffer.duration : 0.5;
                  const preSilence = 0.5; const postSilence = 1.5;
                  const totalSlideDur = preSilence + audioDur + postSilence;

                  await encodeSilence(preSilence);
                  if (buffer) await encodeAudioBuffer(buffer); else await encodeSilence(audioDur);
                  await encodeSilence(postSilence);

                  const totalFrames = Math.floor(totalSlideDur * FPS);
                  const scriptText = normalizeText(slides[i].script);
                  const segments = splitForSubtitles(scriptText);

                  for (let f = 0; f < totalFrames; f++) {
                      const timeSec = f / FPS;
                      let currentSubtitle = "";
                      if (timeSec >= preSilence && timeSec < preSilence + audioDur && segments.length > 0) {
                          currentSubtitle = segments[Math.floor(Math.min((timeSec - preSilence) / audioDur, 0.99) * segments.length)] || "";
                      }
                      drawSlideSync(i, currentSubtitle);
                      const frame = new VideoFrame(canvasRef.current, { timestamp: Math.round(videoTimestampUs + (f * 1000000 / FPS)) });
                      videoEncoder.encode(frame, { keyFrame: f % (FPS * 2) === 0 });
                      frame.close();
                      if (videoEncoder.encodeQueueSize > 30) await sleep(1);
                      if (f % 15 === 0) setProgress(((i + f / totalFrames) / slides.length) * 100);
                  }
                  videoTimestampUs += (totalFrames * 1000000 / FPS);
              }

              setProgress(100); setStatus("最終ファイルを構築中...");
              await videoEncoder.flush(); await audioEncoder.flush(); muxer.finalize();

              const finalBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
              const a = document.createElement('a');

              a.download = `LiteStudioPro_Export.mp4`;

      const startEditorSegment = useCallback((idx, start, end, duration, startOffsetRatio) => {
          stopGlobalAudio();
          if (editorAnimRef.current) cancelAnimationFrame(editorAnimRef.current);
          updatePlaybackState(idx, true, startOffsetRatio);
          const startOffsetSec = duration * startOffsetRatio;
          const ctx = getAudioContext();
          const source = ctx.createBufferSource();
          globalSource = source; 
          
          if (editorIndividualBuffers.has(idx)) {

              source.start(0, startOffsetSec);
          } else {
              source.buffer = fullBuffer;
              source.connect(ctx.destination);
              const safeOffset = Math.min(startOffsetSec, Math.max(0, duration - 0.1));
              source.start(0, start + safeOffset, duration - safeOffset);

                  setEditorSeekRatio(elapsed / duration);
              }
              editorAnimRef.current = requestAnimationFrame(loop);
          };
          editorAnimRef.current = requestAnimationFrame(loop);
      }, [fullBuffer, editorIndividualBuffers, updatePlaybackState]);

      const togglePlayPause = (idx, start, end, duration) => {

               <button onClick={()=>setShowApiKeyModal(true)} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full transition-colors group">

                   </div>
                )}
              </div>
              
              {/* ★改善③：投げ銭リンクをこっそり配置 */}
              <div className="p-4 text-center border-t border-slate-800 bg-slate-900/50">
                  <a href="https://www.buymeacoffee.com/" target="_blank" className="text-[10px] text-slate-500 hover:text-amber-400 transition-colors flex items-center justify-center gap-1">
                      ☕ この無料ツールが役に立ったらコーヒーを奢る
                  </a>
              </div>
            </div>

            <div className={`w-1 z-20 cursor-col-resize transition-colors ${isDraggingSplitter ? 'bg-fuchsia-500' : 'bg-slate-800 hover:bg-fuchsia-500'}`} onMouseDown={(e) => { e.preventDefault(); setIsDraggingSplitter(true); }} />

            <div className="flex-1 bg-black flex flex-col relative canvas-container" ref={containerRef}>
              <div className="flex-1 flex items-center justify-center p-8">
                 <div className="relative shadow-2xl border border-slate-800 bg-black rounded-sm overflow-hidden ring-1 ring-white/5">
                    <canvas ref={canvasRef} width={1280} height={720} className="max-w-full max-h-full object-contain"/>
                 </div>
              </div>
              <div className="bg-slate-900/80 backdrop-blur border-t border-slate-800 p-3 flex justify-between items-center text-xs text-slate-400">
                 <div className="font-mono">{status || "Ready"}</div>
                 <div className="font-mono">Slide: <span className="text-white">{activeSlideIdx + 1}</span> <span className="opacity-50">/</span> {slides.length || 0}</div>
              </div>
              
              {isBusy && (
                <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50 backdrop-blur-md">
                  <div className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-cyan-400 animate-pulse mb-2">{status}</div>
                  <div className="w-1/2 h-1 bg-slate-800 rounded-full mt-4 overflow-hidden relative">
                     <div className="h-full bg-fuchsia-500 transition-all duration-300" style={{width: `${progress}%`}}></div>
                  </div>
                </div>
              )}
            </div>

            {/* 手動エディタ (エコモード用) */}
            {showManualEditor && fullBuffer && (
              <div className="absolute inset-0 z-50 bg-black/95 flex flex-col p-6 animate-fade-in backdrop-blur-xl">
                 <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                    <div>
                        <h2 className="text-2xl font-bold text-white">✂️ 手動カット調整 (エコモード)</h2>
                        <p className="text-xs text-slate-400 mt-1">±ボタンで微調整してください。</p>
                    </div>
                    <div className="flex gap-3">
                        <button onClick={()=>{pauseEditorSegment(); setShowManualEditor(false);}} className="px-4 py-2 rounded-lg bg-slate-800 text-white">キャンセル</button>
                        <button onClick={applyManualSplit} className="px-6 py-2 rounded-lg bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold">この設定で分割を確定</button>
                    </div>
                 </div>
                 <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                    {slides.map((s, i) => {
                        const startSec = i === 0 ? 0 : manualSplitTimes[i-1];
                        const endSec = i === slides.length - 1 ? (manualSplitTimes.length > 0 ? Math.max(fullBuffer.duration, manualSplitTimes[manualSplitTimes.length - 1] + 3.0) : fullBuffer.duration) : manualSplitTimes[i];
                        const duration = Math.max(0.1, endSec - startSec);
                        const isThisActive = editorActiveIdx === i;
                        return (
                           <div key={i} className={`glass-panel p-5 rounded-xl flex items-stretch gap-5 border ${isThisActive ? 'border-emerald-500 bg-emerald-900/10' : 'border-slate-700'}`}>
                               <div className="w-36 shrink-0 aspect-video bg-black rounded-lg overflow-hidden relative mt-1">
                                   <img src={s.imageDataUrl} className="w-full h-full object-cover opacity-80"/>
                                   <div className="absolute top-0 left-0 bg-black/80 text-[10px] px-2 py-1 text-white">Slide {i+1}</div>
                               </div>
                               <div className="flex-1 flex flex-col gap-3 justify-between">
                                   <div className="flex items-center justify-end gap-2 text-xs text-slate-300">
                                       <button onClick={()=>adjustSplitTime(i, -0.5)} className="px-2 py-1 bg-slate-800 rounded">-0.5s</button>
                                       <button onClick={()=>adjustSplitTime(i, -0.1)} className="px-2 py-1 bg-slate-800 rounded">-0.1s</button>
                                       <div className="w-16 text-center py-1 text-white font-mono bg-black border border-slate-700 rounded">{(manualSplitTimes[i] || 0).toFixed(2)}</div>
                                       <button onClick={()=>adjustSplitTime(i, 0.1)} className="px-2 py-1 bg-slate-800 rounded">+0.1s</button>
                                       <button onClick={()=>adjustSplitTime(i, 0.5)} className="px-2 py-1 bg-slate-800 rounded">+0.5s</button>
                                   </div>
                                   <div className="flex items-center gap-4 p-2 rounded-xl border bg-black/40 border-slate-700">
                                       <button onClick={() => togglePlayPause(i, startSec, endSec, duration)} className="w-10 h-10 rounded-full flex items-center justify-center bg-emerald-600/20 text-emerald-400 text-lg">
                                           {isThisActive && editorIsPlaying ? '⏸️' : '▶'}
                                       </button>
                                       <input type="range" min="0" max="1" step="0.001" value={isThisActive ? editorSeekRatio : 0} onChange={(e) => handleSeekChange(i, parseFloat(e.target.value))} onMouseUp={(e) => handleSeekEnd(i, startSec, endSec, duration, parseFloat(e.target.value))} className="flex-1 custom-range"/>
                                   </div>
                               </div>
                           </div>
                        )
                    })}
                 </div>
              </div>
            )}
            
          </div>
        </div>
      );
    }

    function App() { return <ToastProvider><MainApp /></ToastProvider>; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
